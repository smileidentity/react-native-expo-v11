name: 'Release SDK'

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/ci.yml

  publish:
    name: Tag, release, and publish
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
      id-token: write
    outputs:
      new_tag: ${{ steps.read_version.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Read package version
        id: read_version
        run: |
          new_version=$(node -p "require('./package.json').version")
          if [ -z "$new_version" ]; then
            echo "Could not read version from package.json" >&2
            exit 1
          fi
          if ! printf '%s' "$new_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "package.json version '$new_version' is not a valid semver" >&2
            exit 1
          fi
          new_tag="v$new_version"
          pkg_name=$(node -p "require('./package.json').name")
          echo "new_version=$new_version" >> "$GITHUB_ENV"
          echo "new_tag=$new_tag" >> "$GITHUB_ENV"
          echo "pkg_name=$pkg_name" >> "$GITHUB_ENV"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $pkg_name@$new_version ($new_tag)"

      - name: Verify npm version not already published
        run: |
          published=$(npm view "${pkg_name}@${new_version}" version 2>/dev/null || true)
          if [ -n "$published" ]; then
            echo "npm version ${pkg_name}@${new_version} is already published; refusing to republish" >&2
            exit 1
          fi
          echo "${pkg_name}@${new_version} is not yet on npm — proceeding"

      - name: Create or reuse tag
        run: |
          head_sha=$(git rev-parse HEAD)
          # Local tag check
          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null; then
            local_sha=$(git rev-list -n 1 "refs/tags/${new_tag}")
            if [ "$local_sha" != "$head_sha" ]; then
              echo "Tag ${new_tag} exists locally at ${local_sha} but HEAD is ${head_sha}" >&2
              exit 1
            fi
            echo "Local tag ${new_tag} already at HEAD; reusing"
          else
            git tag "$new_tag"
          fi
          # Remote tag check / push
          remote_sha=$(git ls-remote origin "refs/tags/${new_tag}" | awk '{print $1}')
          if [ -n "$remote_sha" ]; then
            if [ "$remote_sha" != "$head_sha" ]; then
              echo "Tag ${new_tag} exists on origin at ${remote_sha} but HEAD is ${head_sha}" >&2
              exit 1
            fi
            echo "Remote tag ${new_tag} already at HEAD; skipping push"
          else
            git push origin "$new_tag"
          fi

      - name: Create or reuse GitHub release
        run: |
          if gh release view "$new_tag" >/dev/null 2>&1; then
            echo "GitHub release $new_tag already exists; skipping"
          else
            gh release create "$new_tag" --title "Release $new_tag" --notes "Release notes for $new_tag"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Publish package
        run: |
          yarn prepare
          npm publish

  post-release:
    name: Post-release actions
    needs: publish
    uses: ./.github/workflows/post_release.yml
    with:
      tag_name: ${{ needs.publish.outputs.new_tag }}
    secrets: inherit
